services:
  odoo13:
    image: odoo:13.0
    container_name: odoo13
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - odoo13-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - PORT=5432
      - USER=odoo13
      - PASSWORD=odoo13
    restart: unless-stopped
  db:
    image: postgres:13
    container_name: odoo13-db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo13
      - POSTGRES_PASSWORD=odoo13
    volumes:
      - odoo13-db:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  odoo13-data:
  odoo13-db:
